<!DOCTYPE html>
<html>

<head>
    <meta name="viewport"
        content="width=device-width, initial-scale=1">
    <title>
        How To Create a Tab Image Gallery
    </title>
</head>
<style>
    
    h1 {
        color: green;
    }
          
    /* column pic */
    .column {
        float: left;
        width: 25%;
        padding: 10px;
    }
          
    /* Style the images of gallery */
    .column img {
        opacity: 0.6;
        cursor: zoom-in;
        padding: 5px;
    }
    
    .column img:hover {
        opacity: 1;
        transform: scale(1.1);
        transition: 0.5s;
    }
    
    .column img:active {
        opacity: 1;
    }
          
    * {
        box-sizing: border-box;
    }
    
    /* Expanding image text */
    #geeks {
        position: absolute;
        left: 200px;
        padding-top: 100px;
        font-size: 28px;
        color: #EFECE9;
        align-items: center;
    }
    
    #geeks:hover {
        color: #ADE3BD;
        cursor: wait;
    }
</style>
<script>
    function gfg(imgs) {
        var expandImg = document.getElementById("expand");
        var imgText = document.getElementById("geeks");
        expandImg.src = imgs.src;
        imgText.innerHTML = imgs.alt;
        expandImg.parentElement.style.display = "block";
    }
</script>
<body>
    <div style="text-align:center">
        <h1>SHOES SHOP</h1>
        
        <h4>SHOES STOR</h4>
        
<p>Tab Image Gallery</p>

    </div>

    <!-- gallery pic -->
    <div class="row">
        <div id="geeks">
            Here the Photo will be displayed
        </div>

        <div class="column">
            <img src=
"https://crowcialondon.in/cdn/shop/files/Your-Design-Here-2_1.jpg?v=1725694893&width=1920"
                style="width:100%" onclick="gfg(this);">
            <img src=
"https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSy8pWJMjGqwBkl1mi0nvTybt2X17DkowP85g&s"
                style="width:100%" onclick="gfg(this);">
            <img src=
"https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSo6r2H66Jdu4G04GlHW6rs81Y1mZQ0WFo_YA&s"
                style="width:100%" onclick="gfg(this);">
        </div>

        <div class="column">
            <span onclick=
                "this.parentElement.style.display='none'">
            </span>
            
            <img id="expand" style="width:70%; 
                height: 50%; margin-top: 15px;">
        </div>
    </div>
</body>

</html>
