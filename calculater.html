<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Calculator</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #ecf00e, #00c6ff);
        }

        .calculator {
            width: 340px;
            background: #d2e7d4;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(192, 107, 107, 0.3);
        }

        #result {
            width: 100%;
            height: 60px;
            font-size: 28px;
            text-align: right;
            padding: 10px;
            margin-bottom: 15px;
            border: none;
            outline: none;
            background: #f5d3d3;
            border-radius: 10px;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        button {
            padding: 18px;
            font-size: 22px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: .2s;
        }

        button:hover {
            transform: scale(1.05);
        }

        .number {
            background: #f090c0;
        }

        .number:hover {
            color: #a30707;
            background-color: aqua;
            font-size: larger;

        }

        .operator {
            background: #ffd166;
        }

        .clear {
            background: #ff4d4d;
            color: white;
        }

        .equal {
            background: #38ffd7;
            color: white;
        }
    </style>
</head>

<body>

    <div class="calculator">

        <input type="text" id="result" readonly>

        <div class="buttons">

            <button class="clear" onclick="clearResult()">C</button>
            <button class="operator" onclick="appendOperator('/')">÷</button>
            <button class="operator" onclick="appendOperator('*')">×</button>
            <button class="operator" onclick="appendOperator('-')">-</button>

            <button class="number" onclick="appendNumber('7')">7</button>
            <button class="number" onclick="appendNumber('8')">8</button>
            <button class="number" onclick="appendNumber('9')">9</button>
            <button class="operator" onclick="appendOperator('+')">+</button>

            <button class="number" onclick="appendNumber('4')">4</button>
            <button class="number" onclick="appendNumber('5')">5</button>
            <button class="number" onclick="appendNumber('6')">6</button>
            <button class="equal" onclick="calculateResult()">=</button>

            <button class="number" onclick="appendNumber('1')">1</button>
            <button class="number" onclick="appendNumber('2')">2</button>
            <button class="number" onclick="appendNumber('3')">3</button>
            <button class="number" onclick="appendNumber('.')">.</button>

            <button class="number" style="grid-column: span 4;" onclick="appendNumber('0')">0</button>

        </div>

    </div>

    <script>

        let expression = "";

        function updateDisplay() {
            document.getElementById("result").value = expression;
        }

        function appendNumber(num) {
            expression += num;
            updateDisplay();
        }

        function appendOperator(op) {

            if (expression === "") return;

            let last = expression.slice(-1);

            if (["+", "-", "*", "/"].includes(last)) {
                expression = expression.slice(0, -1) + op;
            } else {
                expression += op;
            }

            updateDisplay();
        }

        function calculateResult() {

            try {

                let answer = eval(expression);

                expression = answer.toString();

                updateDisplay();

            } catch {

                document.getElementById("result").value = "Error";

                expression = "";
            }

        }

        function clearResult() {

            expression = "";

            updateDisplay();

        }

    </script>

</body>

</html>
